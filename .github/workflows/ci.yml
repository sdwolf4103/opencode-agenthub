name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run smoke tests
        run: bun run test:smoke

  pack:
    name: Pack verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build package
        run: bun run build
      - name: Verify npm pack output
        run: |
          OUTPUT=$(npm pack --dry-run 2>&1)
          echo "$OUTPUT"
          # Verify critical files are present in the tarball
          echo "$OUTPUT" | grep -q "dist/composer/opencode-profile.js" || { echo "MISSING: dist/composer/opencode-profile.js"; exit 1; }
          echo "$OUTPUT" | grep -q "dist/plugins/opencode-agenthub.js" || { echo "MISSING: dist/plugins/opencode-agenthub.js"; exit 1; }
          echo "$OUTPUT" | grep -q "dist/composer/library" || { echo "MISSING: dist/composer/library"; exit 1; }
          echo "Pack verification passed."
